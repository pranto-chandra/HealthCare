name: Build and Deploy to Azure VM

on:
  push:
    branches: [ main, deploy ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: ./Backend
          push: true
          tags: ${{ env.REGISTRY }}/healthcare-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./Frontend
          push: true
          tags: ${{ env.REGISTRY }}/healthcare-frontend:latest
          build-args: |
            REACT_APP_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd /home/${{ secrets.AZURE_VM_USERNAME }}/healthcare
            
            # Pull latest code from GitHub
            git pull origin main
            
            # Update .env file with production values (pull from repo or use secrets)
            # Note: You should store the production .env in a secure location
            
            # Login to container registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images
            docker pull ${{ env.REGISTRY }}/healthcare-backend:latest
            docker pull ${{ env.REGISTRY }}/healthcare-frontend:latest
            docker pull mysql:8.0
            
            # Stop and remove old containers
            docker compose --env-file .env.docker down || true
            
            # Start containers with new images
            docker compose --env-file .env.docker up -d
            
            # Run database migrations
            docker compose --env-file .env.docker run --rm prisma-migrate || true
            
            # Output status
            echo "Deployment completed successfully!"
            docker compose --env-file .env.docker ps

  notify:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "Deployment status: ${{ job.status }}"
          # Add Slack/Email notification here if needed
