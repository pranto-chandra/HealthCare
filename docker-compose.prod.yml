services:
  # MySQL Database Service - Production Optimized
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-healthcare_db}
      MYSQL_USER: ${MYSQL_USER:-healthcare_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_logs:/var/log/mysql
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max_connections=200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mysql-setup:
    image: mysql:8.0
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-healthcare_db}
      MYSQL_USER: ${MYSQL_USER:-healthcare_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-userpassword123}
    command:
      - sh
      - -c
      - |
        mysql -hmysql -uroot -p"$${MYSQL_ROOT_PASSWORD}" <<SQL
        CREATE DATABASE IF NOT EXISTS \`$${MYSQL_DATABASE}\`;
        CREATE USER IF NOT EXISTS '$${MYSQL_USER}'@'%' IDENTIFIED BY '$${MYSQL_PASSWORD}';
        ALTER USER '$${MYSQL_USER}'@'%' IDENTIFIED BY '$${MYSQL_PASSWORD}';
        GRANT ALL PRIVILEGES ON \`$${MYSQL_DATABASE}\`.* TO '$${MYSQL_USER}'@'%';
        FLUSH PRIVILEGES;
        SQL
    networks:
      - healthcare-network

  prisma-migrate:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
    command: ["npm", "run", "prisma:deploy"]
    depends_on:
      mysql-setup:
        condition: service_completed_successfully
    networks:
      - healthcare-network

  # Backend API Service - Production
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      API_URL: ${API_URL:-http://localhost/api}
    ports:
      - "5000:5000"
    volumes:
      - ./Backend/uploads:/app/uploads
      - ./Backend/logs:/app/logs
    depends_on:
      prisma-migrate:
        condition: service_completed_successfully
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Service - Production
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    restart: always
    environment:
      NODE_ENV: production
      REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
    driver: local
  mysql_logs:
    driver: local

networks:
  healthcare-network:
    driver: bridge
